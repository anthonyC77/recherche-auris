name: Recherche Toyota Auris Touring Sport

on:
  workflow_dispatch:   # déclenché manuellement ou par le script de démarrage Windows

concurrency:
  group: recherche-quotidienne
  cancel-in-progress: false  # ne pas annuler un run déjà en cours

jobs:
  recherche:
    runs-on: self-hosted     # exécuté sur votre PC avec votre IP résidentielle
    permissions:
      contents: write

    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dependances
        run: |
          pip install requests beautifulsoup4 lxml playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Lancer la recherche
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python recherche_auris.py

      - name: Sauvegarder les CSV mis a jour
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.csv *_log.txt
          git diff --cached --quiet || git commit -m "Mise a jour annonces $(date +'%Y-%m-%d')"
          git push
